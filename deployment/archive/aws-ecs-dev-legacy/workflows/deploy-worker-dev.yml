# =============================================================================
#
# File: deploy-worker-dev.yml (name is historical). Runs only on workflow_dispatch.
#
# Optional manual job — does NOT build images, push ECR, or update ECS services.
#
# Use this workflow when you need an extra in-VPC schema check (config-check + validate only)
# without running a full deploy.
# It uses the same migration runner pattern (task-definition-family + image digest), not a pinned
# task-definition revision.
#
# Restore: copy this file to .github/workflows/ and scripts to .github/scripts/ per README in this archive.
#

name: Validate schema (manual, ECS task)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Backend image tag to validate (typically a commit SHA)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  MIGRATION_TASK_DEFINITION_FAMILY: ${{ vars.MIGRATION_TASK_DEFINITION_FAMILY || vars.ECS_TASK_DEFINITION_FAMILY }}
  MIGRATION_CONTAINER_NAME: ${{ vars.MIGRATION_CONTAINER_NAME }}
  MIGRATION_SUBNETS: ${{ vars.MIGRATION_SUBNETS }}
  MIGRATION_SECURITY_GROUPS: ${{ vars.MIGRATION_SECURITY_GROUPS }}
  MIGRATION_ASSIGN_PUBLIC_IP: ${{ vars.MIGRATION_ASSIGN_PUBLIC_IP }}
  MIGRATION_LAUNCH_TYPE: ${{ vars.MIGRATION_LAUNCH_TYPE }}
  MIGRATION_PLATFORM_VERSION: ${{ vars.MIGRATION_PLATFORM_VERSION }}

jobs:
  ecs-migration-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate ECS migration task settings
        run: |
          for key in AWS_REGION ECS_CLUSTER ECR_REPOSITORY MIGRATION_CONTAINER_NAME MIGRATION_SUBNETS MIGRATION_SECURITY_GROUPS; do
            if [ -z "${!key}" ]; then
              echo "Missing required repository variable: ${key}" >&2
              exit 1
            fi
          done

  schema-validate:
    runs-on: ubuntu-latest
    needs: ecs-migration-preflight
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image digest from tag
        id: image
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          DIGEST="$(aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids "imageTag=${IMAGE_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          if [ -z "${DIGEST}" ] || [ "${DIGEST}" = "None" ]; then
            echo "ERROR: failed to resolve digest for ${ECR_REPOSITORY}:${IMAGE_TAG}" >&2
            exit 1
          fi
          echo "IMAGE_DIGEST=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Validate schema compatibility via ECS task (inside AWS/VPC)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_DIGEST: ${{ steps.image.outputs.IMAGE_DIGEST }}
          MIGRATION_COMMAND: >-
            python scripts/db_migrate.py config-check
            && python scripts/db_migrate.py validate
        run: |
          ../.github/scripts/run-ecs-migration-task.sh
