# =============================================================================
# MAIN — Quality Gate before merge
# =============================================================================
#
# Purpose:
# Validate pull requests targeting `main` before merging.
#
# Branching:
# - feature → main → develop
# - `develop` is the automatic DEV deploy branch.
# - `main` is not production yet, but it must remain stable because it is the
#   integration branch before future production/release flows.
#
# Blocking intent:
# - Backend quality must pass.
# - Frontend quality must pass.
# - Security audits (pip-audit + npm audit high) must pass.
#
# GitHub Free note:
# If branch protection / required status checks are unavailable for this private
# repository, this workflow still provides visible PR validation, but merging must
# be controlled manually by team convention.


#
# =============================================================================

name: Main quality gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-main-quality:
    name: Main backend — compileall, ruff, mypy, pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Syntax / import sanity
        working-directory: backend
        run: python -m compileall src

      - name: Ruff
        working-directory: backend
        run: ruff check .

      - name: Mypy
        working-directory: backend
        run: mypy src

      # Root pytest.ini expects tests under backend/tests and pythonpath=backend.
      - name: Pytest
        run: pytest

  frontend-main-quality:
    name: Main frontend — check:cache, typecheck, lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache convention check
        run: npm run check:cache

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  security-main-light:
    name: Main security — pip-audit + npm audit high
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend runtime and pip-audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # setuptools>=83.0.0 — PYSEC-2026-3447 / CVE-2026-59890 (MANIFEST.in Unicode bypass)
          pip install "setuptools>=83.0.0" pip-audit
          pip install -e .

      - name: pip-audit
        working-directory: backend
        run: pip-audit --skip-editable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit --audit-level=high
        working-directory: frontend
        run: npm audit --audit-level=high
