# =============================================================================
# DEV — Deploy backend to OpenCloud (SSH + Docker Compose)
# =============================================================================
#
# CI/CD contract (DEV):
# - **Develop quality gate** is the only blocking validation before automatic DEV deploy.
# - This workflow runs after that gate completes (`workflow_run`). It does **not** deploy
#   unless the gate **concluded success** and the triggering event was a **push** to **develop**.
# - On **push to develop** with a **failed / cancelled** quality gate, this workflow **fails
#   visibly** (`should-deploy` exits 1) so the run is red and no SSH deploy runs.
# - **PRs** and **manual** quality-gate runs: `should-deploy` exits 0 with `deploy=false` (no deploy).
# - **workflow_dispatch** here: manual backend deploy still runs (does not depend on the gate).
# - Frontend DEV (Vercel): Git integration on push to `develop` — see `docs/deployment/DEV-VERCEL.md`.
#
# Branching: feature → main → develop; automatic DEV deploy runs from develop only.
# main is not production. Production will use a dedicated branch later.
#
# Automatic deploy: `workflow_run` after "Develop quality gate" completes.
# Filters: only when gate succeeded + **push** to **develop** + path filter:
#   `backend/**` or this workflow file changed.
# Manual deploy: `workflow_dispatch` on THIS workflow (unchanged behavior).
#
# Secrets: DEV_HOST, DEV_USER, DEV_SSH_PRIVATE_KEY
# Optional secret: DEV_BACKEND_URL — if set, runner curls public /health after deploy.
#
# SSH: port is set explicitly below (non-default; not port 22).
#
# CI-1.3.3: Host bind uses backend/scripts/patch_compose_host_port.py (no inline Python/heredoc in SSH —
# appleboy/ssh-action wraps lines and breaks heredocs). Default host port 8001→container 8000;
# BACKEND_HOST_PORT on the server overrides.
#
# Server: repo at /opt/dinamic/dinamic-gemini, reset to origin/develop, then:
#   cd backend → docker-compose down → build api → up -d → dev_deploy_db_migrate.sh
#   check_deploy_secrets (host + container) → migrations (doctor skipped by default) → /health poll.
#   Server-local backend/docker-compose.override.yml is preserved (not deleted on deploy).
# git fetch origin must work non-interactively (deploy key or credentials on the server).
# Env file for the API is at repo root: /opt/dinamic/dinamic-gemini/.env (see backend/docker-compose.yml env_file).
#
# =============================================================================

name: DEV — OpenCloud backend (SSH)

on:
  workflow_run:
    workflows: ["Develop quality gate"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: dev-opencloud-backend-develop
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  should-deploy:
    name: Gate — after quality gate (event / branch / paths)
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
      head_sha: ${{ steps.decide.outputs.head_sha }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_run'
        with:
          fetch-depth: 0

      - id: decide
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy; proceeding without quality gate."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          EVENT="${{ github.event.workflow_run.event }}"
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "workflow_run: conclusion=${CONCLUSION} event=${EVENT} head_branch=${HEAD_BRANCH}"

          # Push to develop with a failed gate: fail the workflow (no SSH deploy).
          if [ "${EVENT}" = "push" ] && [ "${HEAD_BRANCH}" = "develop" ] && [ "${CONCLUSION}" != "success" ]; then
            echo "::error::DEV backend deploy is blocked because Develop quality gate did not succeed (conclusion=${CONCLUSION}). Fix the gate or use workflow_dispatch on this workflow for a manual deploy."
            exit 1
          fi

          # Non-success for PR / manual gate / other branches: skip safely (green).
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Quality gate did not succeed; skipping deploy (not a blocking push-to-develop failure)."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${EVENT}" != "push" ]; then
            echo "Not a push to develop (e.g. PR or manual gate run); skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${HEAD_BRANCH}" != "develop" ]; then
            echo "Push not on develop; skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout "${HEAD_SHA}"
          BASE=$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)
          if [ -z "${BASE}" ]; then
            echo "No parent commit; deploying."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "${BASE}" "${HEAD_SHA}")
          BACKEND_PATH_RE='^backend/|^\.github/workflows/deploy-dev-opencloud-backend\.yml'
          echo "head_sha=${HEAD_SHA}"
          if grep -qE "${BACKEND_PATH_RE}" <<< "${CHANGED}"; then
            echo "Backend-relevant changes detected; deploy=true"
            grep -E "${BACKEND_PATH_RE}" <<< "${CHANGED}" | sed -n '1,120p' || true
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "No backend or deploy workflow changes; skipping OpenCloud deploy (deploy=false)."
            echo "Changed paths (first 40, for context):"
            sed -n '1,40p' <<< "${CHANGED}"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
          fi

  migration-presence:
    name: Migration file guard (push via gate only)
    runs-on: ubuntu-latest
    needs: [should-deploy]
    if: needs.should-deploy.outputs.deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.should-deploy.outputs.head_sha }}

      - name: Validate migration presence for DB-layer changes
        env:
          HEAD_SHA: ${{ needs.should-deploy.outputs.head_sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Skipping migration presence (manual deploy)."
            exit 0
          fi
          if [ -z "${HEAD_SHA}" ]; then
            echo "No head_sha; skipping migration check."
            exit 0
          fi
          BASE=$(git rev-parse HEAD^ 2>/dev/null || true)
          if [ -z "${BASE}" ] || [ "${BASE}" = "0000000000000000000000000000000000000000" ]; then
            echo "Skipping migration presence (no base ref)."
            exit 0
          fi
          python3 backend/scripts/check_migration_presence.py \
            --base-ref "${BASE}" \
            --head-ref "${HEAD_SHA}"

  deploy:
    name: SSH deploy + local health
    runs-on: ubuntu-latest
    needs: [should-deploy, migration-presence]
    if: needs.should-deploy.outputs.deploy == 'true'
    steps:
      - name: Deploy on server (git reset + docker-compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          port: 37783
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            REPO_ROOT=/opt/dinamic/dinamic-gemini
            if [ ! -d "${REPO_ROOT}" ]; then
              echo "ERROR: repo directory missing: ${REPO_ROOT}" >&2
              exit 1
            fi
            cd "${REPO_ROOT}"
            git fetch origin
            git switch develop 2>/dev/null || git checkout develop
            git reset --hard origin/develop
            if [ ! -f "${REPO_ROOT}/backend/docker-compose.yml" ]; then
              echo "ERROR: missing compose file: ${REPO_ROOT}/backend/docker-compose.yml" >&2
              exit 1
            fi
            if [ ! -f "${REPO_ROOT}/.env" ]; then
              echo "ERROR: missing env file at repo root (Compose expects it): ${REPO_ROOT}/.env" >&2
              exit 1
            fi
            if ! command -v docker-compose >/dev/null 2>&1; then
              echo "ERROR: docker-compose not found on PATH (install docker-compose v1 standalone)" >&2
              exit 1
            fi
            BACKEND_HOST_PORT="${BACKEND_HOST_PORT:-8001}"
            export BACKEND_HOST_PORT

            echo "Using backend host port: ${BACKEND_HOST_PORT}"

            python3 "${REPO_ROOT}/backend/scripts/patch_compose_host_port.py" \
              --compose "${REPO_ROOT}/backend/docker-compose.yml" \
              --host-port "${BACKEND_HOST_PORT}"

            cd "${REPO_ROOT}/backend"

            chmod +x scripts/check_deploy_secrets.sh scripts/dev_deploy_db_migrate.sh 2>/dev/null || true
            echo "==> GCP secrets preflight (host paths + optional compose override)..."
            bash scripts/check_deploy_secrets.sh ensure-override
            bash scripts/check_deploy_secrets.sh host

            docker-compose down --remove-orphans || true

            echo "Building backend image..."
            docker-compose build api

            echo "Starting backend service (required before exec migrations)..."
            docker-compose up -d

            docker-compose ps

            echo "==> GCP secrets preflight (inside api container)..."
            bash scripts/check_deploy_secrets.sh container

            export AUTO_APPLY_DEV_MIGRATIONS="${AUTO_APPLY_DEV_MIGRATIONS:-true}"
            export RUN_MIGRATION_DOCTOR_ON_DEPLOY="${RUN_MIGRATION_DOCTOR_ON_DEPLOY:-false}"
            echo "Running DEV database migrations (AUTO_APPLY_DEV_MIGRATIONS=${AUTO_APPLY_DEV_MIGRATIONS}, RUN_MIGRATION_DOCTOR_ON_DEPLOY=${RUN_MIGRATION_DOCTOR_ON_DEPLOY})..."
            bash "${REPO_ROOT}/backend/scripts/dev_deploy_db_migrate.sh"
            ok=0
            for i in $(seq 1 45); do
              if curl -sfS --connect-timeout 5 --max-time 15 "http://127.0.0.1:${BACKEND_HOST_PORT}/health" >/dev/null; then
                ok=1
                break
              fi
              echo "Local /health attempt ${i}/45 not ready on port ${BACKEND_HOST_PORT}; sleeping 3s..."
              sleep 3
            done
            if [ "${ok}" -ne 1 ]; then
              echo "ERROR: GET http://127.0.0.1:${BACKEND_HOST_PORT}/health did not succeed within ~135s (45 attempts x 3s; allow time after Uvicorn binds for app import/DB)." >&2
              echo "Hint: cd ${REPO_ROOT}/backend && docker-compose ps && docker-compose logs --tail=100 api" >&2
              exit 1
            fi
            echo "Local /health OK"

  public-smoke:
    name: Optional public /health
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: GET /health from DEV_BACKEND_URL
        env:
          BASE_URL: ${{ secrets.DEV_BACKEND_URL }}
        run: |
          if [ -z "${BASE_URL}" ]; then
            echo "DEV_BACKEND_URL not set; skipping public smoke."
            exit 0
          fi
          BASE="${BASE_URL%/}"
          curl --fail --show-error --silent --connect-timeout 10 --max-time 30 "${BASE}/health"
