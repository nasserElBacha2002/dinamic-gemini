# Frontend — typecheck, tests, and Phase 9 cache convention checks.
name: Frontend validate

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-validate.yml'
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-validate.yml'

concurrency:
  group: frontend-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: check:cache + typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check:cache
      - run: npm run typecheck
      - run: npm run test:ci
