# =============================================================================
# Frontend validate (path-filtered, optional faster feedback)
# =============================================================================
#
# **Option A** — kept for faster PR/push signal on `frontend/**` changes only.
# This workflow does **NOT** gate DEV deployments. The only blocking gate for DEV deploy
# is **Develop quality gate** (`develop-quality-gate.yml`), which already runs full
# frontend check:cache, typecheck, lint, test, and build.
#
# Do not treat a green/red result here as permission to deploy; deploy workflows key off
# the quality gate only.
#
# =============================================================================
#
# Frontend — typecheck, Phase 9 cache convention checks, and (when re-enabled) Vitest.
name: Frontend validate

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-validate.yml'
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-validate.yml'

concurrency:
  group: frontend-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: check:cache + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check:cache
      - run: npm run typecheck
      # Temporarily disabled frontend tests because current deploy should not be blocked by UI test instability.
      # TODO: Re-enable Vitest in CI (uncomment the next line) once the suite is stable again.
      # - run: npm run test:ci
