name: Deploy Worker Dev

on:
  push:
    branches:
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/deploy-worker-dev.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.WORKER_ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.WORKER_ECS_SERVICE }}
  DB_SCHEMA_SERVICE_NAME: inventory-api

jobs:
  db-config:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SQLSERVER_ENABLED: "true"
      SQLSERVER_CONNECTION_STRING: ${{ secrets.SQLSERVER_CONNECTION_STRING }}
      SQLSERVER_SERVER: ${{ secrets.SQLSERVER_SERVER }}
      SQLSERVER_DATABASE: ${{ secrets.SQLSERVER_DATABASE }}
      SQLSERVER_UID: ${{ secrets.SQLSERVER_UID }}
      SQLSERVER_PWD: ${{ secrets.SQLSERVER_PWD }}
      SQLSERVER_DRIVER: ${{ vars.SQLSERVER_DRIVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -e .

      - name: SQL Server config preflight (no secrets logged)
        run: |
          dinamic-db-migrate config-check

  schema-validate:
    runs-on: ubuntu-latest
    needs: db-config
    defaults:
      run:
        working-directory: backend
    env:
      SQLSERVER_ENABLED: "true"
      SQLSERVER_CONNECTION_STRING: ${{ secrets.SQLSERVER_CONNECTION_STRING }}
      SQLSERVER_SERVER: ${{ secrets.SQLSERVER_SERVER }}
      SQLSERVER_DATABASE: ${{ secrets.SQLSERVER_DATABASE }}
      SQLSERVER_UID: ${{ secrets.SQLSERVER_UID }}
      SQLSERVER_PWD: ${{ secrets.SQLSERVER_PWD }}
      SQLSERVER_DRIVER: ${{ vars.SQLSERVER_DRIVER }}
      DB_SCHEMA_SERVICE_NAME: ${{ env.DB_SCHEMA_SERVICE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -e .

      - name: Validate schema compatibility before worker rollout
        run: |
          dinamic-db-migrate validate

  deploy:
    runs-on: ubuntu-latest
    needs: schema-validate

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build --platform linux/amd64 -f Dockerfile.worker \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"