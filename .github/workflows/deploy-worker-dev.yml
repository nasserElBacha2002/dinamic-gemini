# =============================================================================
# Worker-only: optional validation (no ECS image deploy here)
# =============================================================================
#
# Production worker deploy runs in **deploy-backend-dev.yml** on every develop push
# under `backend/**`: same commit builds API + worker images, runs migrations, then registers
# digest-pinned task definitions for both services.
#
# Use this workflow only when you need an extra **in-VPC schema validate** run without
# redeploying the API (manual dispatch).
# =============================================================================

name: Worker Dev (optional schema validate)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  MIGRATION_TASK_DEFINITION: ${{ vars.MIGRATION_TASK_DEFINITION }}
  MIGRATION_CONTAINER_NAME: ${{ vars.MIGRATION_CONTAINER_NAME }}
  MIGRATION_SUBNETS: ${{ vars.MIGRATION_SUBNETS }}
  MIGRATION_SECURITY_GROUPS: ${{ vars.MIGRATION_SECURITY_GROUPS }}
  MIGRATION_ASSIGN_PUBLIC_IP: ${{ vars.MIGRATION_ASSIGN_PUBLIC_IP }}
  MIGRATION_LAUNCH_TYPE: ${{ vars.MIGRATION_LAUNCH_TYPE }}
  MIGRATION_PLATFORM_VERSION: ${{ vars.MIGRATION_PLATFORM_VERSION }}

jobs:
  ecs-migration-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate ECS migration task settings
        run: |
          for key in AWS_REGION ECS_CLUSTER MIGRATION_TASK_DEFINITION MIGRATION_CONTAINER_NAME MIGRATION_SUBNETS MIGRATION_SECURITY_GROUPS; do
            if [ -z "${!key}" ]; then
              echo "Missing required workflow env: ${key}" >&2
              exit 1
            fi
          done

  schema-validate:
    runs-on: ubuntu-latest
    needs: ecs-migration-preflight
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate schema compatibility via ECS task (inside AWS/VPC)
        env:
          MIGRATION_COMMAND: >-
            python scripts/db_migrate.py config-check
            && python scripts/db_migrate.py validate
        run: |
          ../.github/scripts/run-ecs-migration-task.sh
