# =============================================================================
# DEV — Vercel frontend handoff (NO Vercel CLI — deploy is on Vercel Git integration)
# =============================================================================
#
# This workflow does NOT deploy. It runs after the Develop quality gate on push
# to `develop` and reminds that Vercel builds/deploys via native Git integration.
#
# See: docs/deployment/DEV-VERCEL.md
#
# Vercel dashboard (required):
#   Production Branch: develop
#   Root Directory: frontend
#   Build Command: npm run build
#   Output Directory: dist
#
# =============================================================================

name: DEV — Vercel frontend handoff

on:
  workflow_run:
    workflows: ["Develop quality gate"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: dev-vercel-frontend-handoff-develop
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  vercel-git-handoff:
    name: Handoff — Vercel Git integration (no Actions deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Handoff notice
        env:
          EVENT_NAME: ${{ github.event_name }}
          GATE_CONCLUSION: ${{ github.event.workflow_run.conclusion || 'n/a' }}
          GATE_EVENT: ${{ github.event.workflow_run.event || 'n/a' }}
          GATE_BRANCH: ${{ github.event.workflow_run.head_branch || 'n/a' }}
          GATE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_run" ]; then
            if [ "${GATE_EVENT}" != "push" ] || [ "${GATE_BRANCH}" != "develop" ]; then
              echo "Not a develop push quality gate run; no Vercel handoff needed."
              exit 0
            fi

            if [ "${GATE_CONCLUSION}" != "success" ]; then
              echo "::error::Develop quality gate did not succeed; fix CI before relying on Vercel deploy."
              exit 1
            fi
          fi

          echo "============================================================"
          echo "DEV — Vercel frontend handoff (this job does NOT deploy)."
          echo "Deploy source of truth: Vercel Git integration on push to develop."
          echo "Documentation: docs/deployment/DEV-VERCEL.md"
          echo "============================================================"
          echo "trigger=${EVENT_NAME}"
          if [ "${EVENT_NAME}" = "workflow_run" ]; then
            echo "quality_gate: push to develop succeeded"
            echo "commit=${GATE_SHA}"
            echo ""
            echo "Next step: open Vercel → Deployments and confirm a build for ${GATE_SHA}."
          else
            echo "manual workflow_dispatch — reminder only"
            echo "commit=${GATE_SHA}"
            echo ""
            echo "Vercel still deploys only via Git integration (not this workflow)."
            echo "Check Vercel → Settings → Git if deploys are missing."
          fi
          echo ""
          echo "This workflow intentionally does NOT run:"
          echo "  npx vercel pull / vercel build / vercel deploy / --prebuilt"
          echo "============================================================"

          echo "::notice title=Vercel handoff::Deployments are created by Vercel Git integration (branch develop). See Vercel dashboard for commit ${GATE_SHA}."
