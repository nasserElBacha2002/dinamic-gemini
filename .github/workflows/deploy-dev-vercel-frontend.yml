# =============================================================================
# DEV — Vercel frontend (preview build + deploy from GitHub Actions)
# =============================================================================
#
# CI/CD contract (DEV):
# - **Develop quality gate** is the only blocking validation before automatic DEV deploy.
# - This workflow runs after that gate completes (`workflow_run`). It does **not** deploy
#   unless the gate **concluded success** and the triggering event was a **push** to **develop**.
# - On **push to develop** with a **failed / cancelled** quality gate, **should-deploy** exits 1
#   so the workflow fails visibly and **no** `vercel deploy` runs.
# - **PRs** and **manual** quality-gate runs: `deploy=false`, exit 0 (no deploy).
# - **workflow_dispatch** here: manual frontend deploy still runs (no gate dependency).
# - Backend DEV: `deploy-dev-opencloud-backend.yml` (same gate contract).
#
# Required secrets:
# - **VERCEL_TOKEN** — Vercel API token for pull/build/deploy.
# Recommended (CLI reads these automatically; required for non-linked CI projects):
# - **VERCEL_ORG_ID** — Vercel team/org ID.
# - **VERCEL_PROJECT_ID** — Vercel project ID.
#
# Vercel: link the GitHub repo in the Vercel dashboard if you also use Git integrations;
# this workflow is independent and uses the CLI with the secrets above. Ensure preview
# environment settings match your project (env vars, build command) in Vercel.
#
# =============================================================================

name: DEV — Vercel frontend

on:
  workflow_run:
    workflows: ["Develop quality gate"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: dev-vercel-frontend-develop
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  should-deploy:
    name: Gate — after quality gate (event / branch / paths)
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
      head_sha: ${{ steps.decide.outputs.head_sha }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_run'
        with:
          fetch-depth: 0

      - id: decide
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy; proceeding without quality gate."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          EVENT="${{ github.event.workflow_run.event }}"
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "workflow_run: conclusion=${CONCLUSION} event=${EVENT} head_branch=${HEAD_BRANCH}"

          if [ "${EVENT}" = "push" ] && [ "${HEAD_BRANCH}" = "develop" ] && [ "${CONCLUSION}" != "success" ]; then
            echo "::error::DEV Vercel frontend deploy is blocked because Develop quality gate did not succeed (conclusion=${CONCLUSION}). Fix the gate or use workflow_dispatch on this workflow for a manual deploy."
            exit 1
          fi

          if [ "${CONCLUSION}" != "success" ]; then
            echo "Quality gate did not succeed; skipping deploy (not a blocking push-to-develop failure)."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${EVENT}" != "push" ]; then
            echo "Not a push to develop (e.g. PR or manual gate run); skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${HEAD_BRANCH}" != "develop" ]; then
            echo "Push not on develop; skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout "${HEAD_SHA}"
          BASE=$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)
          if [ -z "${BASE}" ]; then
            echo "No parent commit; deploying."
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "${BASE}" "${HEAD_SHA}")
          echo "Changed files:"; echo "${CHANGED}"
          if echo "${CHANGED}" | grep -qE '^frontend/|^\.github/workflows/deploy-dev-vercel-frontend\.yml'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "No frontend or this workflow changes; skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Vercel pull + build + deploy (preview)
    runs-on: ubuntu-latest
    needs: [should-deploy]
    if: needs.should-deploy.outputs.deploy == 'true'
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.should-deploy.outputs.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vercel pull (preview env)
        run: npx vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Vercel build
        run: npx vercel build --token="${VERCEL_TOKEN}"

      - name: Vercel deploy (prebuilt)
        run: npx vercel deploy --prebuilt --token="${VERCEL_TOKEN}"
