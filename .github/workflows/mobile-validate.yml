name: Mobile validate

on:
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-validate.yml'
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-validate.yml'

concurrency:
  group: mobile-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: typecheck + lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:core
      - run: npm run test:services
      - run: npm run test:integration
      - name: expo-doctor
        run: npx expo-doctor || true
        continue-on-error: true

  android-debug:
    name: prebuild + assembleDebug
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npx expo install expo-build-properties --yes
      - name: Prebuild Android
        run: npx expo prebuild -p android --non-interactive
      - name: Assemble debug
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
