# =============================================================================
# CI-1 / D1 — Develop Quality Gate (backend + frontend)
# =============================================================================
#
# **Single blocking DEV validation gate** before deploys.
# - Backend: `deploy-dev-opencloud-backend.yml` runs after this gate on push to `develop`.
# - Frontend: Vercel deploys via **Git integration** (Production Branch `develop`);
#   GitHub Actions does **not** call Vercel CLI. See `docs/deployment/DEV-VERCEL.md`.
# Failed gate on push to `develop` causes the backend deploy workflow to **fail visibly**.
#
# Runs on every push and PR targeting `develop`, plus `workflow_dispatch`.
# Blocking jobs: **backend-quality**, **frontend-quality**, **security-light**.
#
# `frontend-validate.yml` is optional faster feedback on frontend paths only; it does
# **not** control deployments (see comments there).
#
# =============================================================================

name: Develop quality gate

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: develop-quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend — compileall, ruff, mypy, pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (editable + dev extras)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Syntax / import sanity (compileall)
        working-directory: backend
        run: python -m compileall src

      - name: Ruff
        working-directory: backend
        run: ruff check .

      - name: Mypy
        working-directory: backend
        run: mypy src

      # Root pytest.ini expects tests under backend/tests and pythonpath=backend.
      - name: Pytest
        run: pytest

  frontend-quality:
    name: Frontend — check:cache, typecheck, lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run check:cache
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test -- --run
      - run: npm run build

  security-light:
    name: Security — pip-audit + npm audit high
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend runtime and pip-audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # setuptools>=83.0.0 — PYSEC-2026-3447 / CVE-2026-59890 (MANIFEST.in Unicode bypass)
          pip install "setuptools>=83.0.0" pip-audit
          pip install -e .

      - name: pip-audit
        working-directory: backend
        run: pip-audit --skip-editable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci (frontend)
        working-directory: frontend
        run: npm ci

      - name: npm audit --audit-level=high
        working-directory: frontend
        run: npm audit --audit-level=high
