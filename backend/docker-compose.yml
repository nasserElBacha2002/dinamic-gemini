# DEV backend on Ubuntu (OpenCloud): build from this Dockerfile, bind port 8000.
# Server-side secrets: repository root `.env` as ../.env from this file (never commit; see docs/deployment/DEV-OPENCLOUD.md).

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    # Persist local artifacts (OUTPUT_DIR=output → /app/output/v3_uploads) across image rebuilds / container recreate.
    volumes:
      - ../data/output:/app/output
      # GCP ADC for ARTIFACT_STORAGE_PROVIDER=gcs (host: repo secrets/ → /app/secrets/)
      # Alternative host path: backend/secrets/ via server-local docker-compose.override.yml
      - ../secrets:/app/secrets:ro
    # Linux Docker: map host.docker.internal → host gateway (Mac/Win Desktop already provide the name).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
