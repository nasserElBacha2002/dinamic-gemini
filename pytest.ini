# Run backend tests from repo root. Backend package is in backend/
[pytest]
testpaths = backend/tests
pythonpath = backend
addopts = --cov=src --cov-report=term-missing --cov-report=html
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: tests that require external services (e.g. SQL Server)
